<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Portfolio — Dulitha K.</title>
    <meta name="description"
        content="An immersive Three.js portfolio featuring an interactive 3D brain visualization." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent1: #ff6ef7;
            --accent2: #56cfff;
            --accent3: #7fff6e;
            --bg: #050510;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        canvas {
            display: block;
        }

        /* ── HUD overlays ── */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* top-left title */
        #title-block {
            position: absolute;
            top: 44px;
            left: 52px;
        }

        #title-block h1 {
            font-size: clamp(1.1rem, 2vw, 1.6rem);
            font-weight: 200;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .55);
        }

        #title-block h1 span {
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent1), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* centre bottom hint */
        #hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: .72rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3);
            animation: fadeHint 3s ease-in-out infinite alternate;
        }

        @keyframes fadeHint {
            from {
                opacity: .25;
            }

            to {
                opacity: .65;
            }
        }

        /* top-right info badge */
        #badge {
            position: absolute;
            top: 44px;
            right: 52px;
            display: flex;
            gap: 10px;
        }

        .dot-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(8px);
            font-size: .68rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .5);
        }

        .dot-chip::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent1);
            box-shadow: 0 0 8px var(--accent1);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: .6;
            }
        }

        /* loading screen */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity .8s ease 1s;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .08);
            border-top-color: var(--accent1);
            border-left-color: var(--accent2);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #loader p {
            font-size: .7rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3);
        }
    </style>
</head>

<body>

    <!-- Loading screen -->
    <div id="loader">
        <div class="loader-ring"></div>
        <p>Initialising brain…</p>
    </div>

    <!-- Three.js canvas -->
    <div id="canvas-container"></div>

    <!-- HUD -->
    <div id="hud">
        <div id="title-block">
            <h1>Portfolio &nbsp;/&nbsp; <span>Dulitha K.</span></h1>
        </div>
        <div id="badge">
            <div class="dot-chip">Three.js</div>
            <div class="dot-chip">Interactive</div>
        </div>
        <div id="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>
    </div>

    <!-- Three.js via CDN -->
    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        /* ─────────────────────────────────────────────
           SCENE SETUP
        ───────────────────────────────────────────── */
        const container = document.getElementById('canvas-container');
        const W = () => window.innerWidth;
        const H = () => window.innerHeight;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(W(), H());
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.045);

        const camera = new THREE.PerspectiveCamera(55, W() / H(), 0.1, 200);
        camera.position.set(0, 0, 4.5);

        /* ─────────────────────────────────────────────
           ORBIT CONTROLS
        ───────────────────────────────────────────── */
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = false;
        controls.minDistance = 2.8;
        controls.maxDistance = 9;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;

        /* ─────────────────────────────────────────────
           CUSTOM SHADER MATERIAL — BRAIN SURFACE
        ───────────────────────────────────────────── */
        const brainVert = /* glsl */`
  varying vec3 vNormal;
  varying vec3 vPos;
  varying float vNoise;
  uniform float uTime;

  //  Classic Perlin 3-D noise (compact version)
  vec4 permute(vec4 x){return mod(((x*34.)+1.)*x,289.);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
  vec3 fade(vec3 t){return t*t*t*(t*(t*6.-15.)+10.);}

  float cnoise(vec3 P){
    vec3 Pi0=floor(P),Pi1=Pi0+vec3(1.);
    Pi0=mod(Pi0,289.);Pi1=mod(Pi1,289.);
    vec3 Pf0=fract(P),Pf1=Pf0-vec3(1.);
    vec4 ix=vec4(Pi0.x,Pi1.x,Pi0.x,Pi1.x);
    vec4 iy=vec4(Pi0.yy,Pi1.yy);
    vec4 iz0=Pi0.zzzz,iz1=Pi1.zzzz;
    vec4 ixy=permute(permute(ix)+iy);
    vec4 ixy0=permute(ixy+iz0),ixy1=permute(ixy+iz1);
    vec4 gx0=ixy0/7.,gy0=fract(floor(gx0)/7.)-.5;
    gx0=fract(gx0);
    vec4 gz0=vec4(.5)-abs(gx0)-abs(gy0);
    vec4 sz0=step(gz0,vec4(0.));
    gx0-=sz0*(step(0.,gx0)-.5);gy0-=sz0*(step(0.,gy0)-.5);
    vec4 gx1=ixy1/7.,gy1=fract(floor(gx1)/7.)-.5;
    gx1=fract(gx1);
    vec4 gz1=vec4(.5)-abs(gx1)-abs(gy1);
    vec4 sz1=step(gz1,vec4(0.));
    gx1-=sz1*(step(0.,gx1)-.5);gy1-=sz1*(step(0.,gy1)-.5);
    vec3 g000=vec3(gx0.x,gy0.x,gz0.x),g100=vec3(gx0.y,gy0.y,gz0.y);
    vec3 g010=vec3(gx0.z,gy0.z,gz0.z),g110=vec3(gx0.w,gy0.w,gz0.w);
    vec3 g001=vec3(gx1.x,gy1.x,gz1.x),g101=vec3(gx1.y,gy1.y,gz1.y);
    vec3 g011=vec3(gx1.z,gy1.z,gz1.z),g111=vec3(gx1.w,gy1.w,gz1.w);
    vec4 norm0=taylorInvSqrt(vec4(dot(g000,g000),dot(g010,g010),dot(g100,g100),dot(g110,g110)));
    g000*=norm0.x;g010*=norm0.y;g100*=norm0.z;g110*=norm0.w;
    vec4 norm1=taylorInvSqrt(vec4(dot(g001,g001),dot(g011,g011),dot(g101,g101),dot(g111,g111)));
    g001*=norm1.x;g011*=norm1.y;g101*=norm1.z;g111*=norm1.w;
    float n000=dot(g000,Pf0),n100=dot(g100,vec3(Pf1.x,Pf0.yz));
    float n010=dot(g010,vec3(Pf0.x,Pf1.y,Pf0.z));
    float n110=dot(g110,vec3(Pf1.xy,Pf0.z));
    float n001=dot(g001,vec3(Pf0.xy,Pf1.z));
    float n101=dot(g101,vec3(Pf1.x,Pf0.y,Pf1.z));
    float n011=dot(g011,vec3(Pf0.x,Pf1.yz));
    float n111=dot(g111,Pf1);
    vec3 fade_xyz=fade(Pf0);
    vec4 n_z=mix(vec4(n000,n100,n010,n110),vec4(n001,n101,n011,n111),fade_xyz.z);
    vec2 n_yz=mix(n_z.xy,n_z.zw,fade_xyz.y);
    float n_xyz=mix(n_yz.x,n_yz.y,fade_xyz.x);
    return 2.2*n_xyz;
  }

  void main(){
    vNormal = normalize(normalMatrix * normal);
    vPos    = position;

    // Multi-octave noise for wrinkles
    float n  = cnoise(position * 2.8 + uTime * 0.12) * 0.18;
          n += cnoise(position * 6.0 - uTime * 0.07) * 0.07;
          n += cnoise(position * 12. + uTime * 0.04) * 0.03;

    vNoise = n;

    // Squish into brain shape: flatten bottom, push top hemisphere up, widen X
    vec3 p = position;
    p.y   += smoothstep(-1.0,  1.0, p.y) * 0.25;  // hemisphere lift
    p.y   += smoothstep( 0.0, -1.0, p.y) * -0.12; // flatten base
    p.x   *= 1.18;                                  // widen
    p.z   *= 0.92;                                  // slightly flatten depth

    p += normal * n;  // apply wrinkle displacement

    gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
  }
`;

        const brainFrag = /* glsl */`
  varying vec3 vNormal;
  varying vec3 vPos;
  varying float vNoise;
  uniform float uTime;

  void main(){
    // Map sphere position to 0-1 UV-like coords
    float py = vPos.y * 0.5 + 0.5;
    float px = vPos.x * 0.5 + 0.5;
    float pz = vPos.z * 0.5 + 0.5;

    // Animated hue shift
    float t = uTime * 0.08;

    // Build three colour gradients that shift over time
    vec3 colA = vec3(
      0.5 + 0.5 * sin(py * 3.14 + t),
      0.2 + 0.4 * sin(px * 2.0  + t + 1.2),
      0.8 + 0.2 * sin(pz * 4.0  + t + 2.4)
    );
    vec3 colB = vec3(
      0.9,
      0.3 + 0.5 * sin(py * 2.5 + t + 0.8),
      0.7 + 0.3 * cos(px * 3.0 + t)
    );
    vec3 colC = vec3(
      0.2 + 0.4 * sin(pz * 2.0 + t + 3.1),
      0.8 + 0.2 * cos(py * 3.5 + t + 1.7),
      0.9
    );

    // Blend based on position + noise
    float blend1 = smoothstep(-1., 1., vPos.y + vNoise * 2.);
    float blend2 = smoothstep(-1., 1., vPos.x * 0.8 + sin(t));
    vec3 col = mix(mix(colA, colB, blend1), colC, blend2);

    // Rim / fresnel glow
    float rim = 1.0 - max(dot(normalize(vNormal), vec3(0.,0.,1.)), 0.0);
    rim = pow(rim, 2.5);
    col += rim * vec3(1.0, 0.5, 0.9) * 0.7;

    // Surface sheen from noise
    col += vNoise * 0.5 * vec3(0.6, 1.0, 0.9);

    gl_FragColor = vec4(col, 1.0);
  }
`;

        const brainMat = new THREE.ShaderMaterial({
            vertexShader: brainVert,
            fragmentShader: brainFrag,
            uniforms: { uTime: { value: 0 } },
            side: THREE.FrontSide,
        });

        /* ─────────────────────────────────────────────
           BRAIN MESH  (high-res icosahedron)
        ───────────────────────────────────────────── */
        const brainGeo = new THREE.IcosahedronGeometry(1.35, 80);
        const brain = new THREE.Mesh(brainGeo, brainMat);
        brain.rotation.x = -0.12;
        scene.add(brain);

        /* ─────────────────────────────────────────────
           WIREFRAME OVERLAY (translucent "thoughts")
        ───────────────────────────────────────────── */
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.04,
        });
        const wire = new THREE.Mesh(brainGeo.clone(), wireMat);
        wire.scale.setScalar(1.004);
        brain.add(wire);

        /* ─────────────────────────────────────────────
           INNER GLOW SPHERE
        ───────────────────────────────────────────── */
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x7f00ff,
            transparent: true,
            opacity: 0.09,
            side: THREE.BackSide,
        });
        const glow = new THREE.Mesh(new THREE.IcosahedronGeometry(1.35, 4), glowMat);
        glow.scale.setScalar(1.25);
        scene.add(glow);

        /* ─────────────────────────────────────────────
           SYNAPTIC PARTICLES AROUND BRAIN
        ───────────────────────────────────────────── */
        function makeSynapticParticles(count) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const col = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const speeds = new Float32Array(count);

            const palette = [
                new THREE.Color(0xff6ef7),
                new THREE.Color(0x56cfff),
                new THREE.Color(0x7fff6e),
                new THREE.Color(0xffc85e),
                new THREE.Color(0xff4d8b),
                new THREE.Color(0x38f5e8),
            ];

            for (let i = 0; i < count; i++) {
                // Random point on/near sphere surface
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                const r = 1.5 + Math.random() * 1.8;

                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);

                const c = palette[Math.floor(Math.random() * palette.length)];
                col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
                sizes[i] = Math.random() * 3.5 + 0.5;
                speeds[i] = Math.random() * 0.6 + 0.2;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.PointsMaterial({
                size: 0.028,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            return { pts: new THREE.Points(geo, mat), speeds };
        }

        const { pts: synPts, speeds: synSpeeds } = makeSynapticParticles(2800);
        scene.add(synPts);

        /* ─────────────────────────────────────────────
           STAR-FIELD BACKGROUND
        ───────────────────────────────────────────── */
        function makeStarField(count) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 35 + Math.random() * 60;
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                size: 0.065,
                color: 0xffffff,
                transparent: true,
                opacity: 0.55,
                depthWrite: false,
            });
            return new THREE.Points(geo, mat);
        }
        scene.add(makeStarField(3500));

        /* ─────────────────────────────────────────────
           LIGHTING
        ───────────────────────────────────────────── */
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const pointA = new THREE.PointLight(0xff55ff, 4.0, 12);
        pointA.position.set(3, 2, 3);
        scene.add(pointA);

        const pointB = new THREE.PointLight(0x55ffff, 3.5, 12);
        pointB.position.set(-3, -1, -3);
        scene.add(pointB);

        const pointC = new THREE.PointLight(0x88ff55, 2.5, 10);
        pointC.position.set(0, 3, -2);
        scene.add(pointC);

        /* ─────────────────────────────────────────────
           ORBITING ENERGY RINGS
        ───────────────────────────────────────────── */
        function makeRing(radius, color, tilt) {
            const geo = new THREE.TorusGeometry(radius, 0.006, 8, 200);
            const mat = new THREE.MeshBasicMaterial({
                color,
                transparent: true,
                opacity: 0.38,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = tilt.x;
            mesh.rotation.z = tilt.z;
            return mesh;
        }

        const ring1 = makeRing(2.1, 0xff6ef7, { x: Math.PI / 2, z: 0.3 });
        const ring2 = makeRing(2.3, 0x56cfff, { x: Math.PI / 3, z: -0.8 });
        const ring3 = makeRing(2.5, 0x7fff6e, { x: Math.PI * 0.15, z: 1.2 });
        const ringsGroup = new THREE.Group();
        ringsGroup.add(ring1, ring2, ring3);
        scene.add(ringsGroup);

        /* ─────────────────────────────────────────────
           NEURAL TENDRILS (line segments)
        ───────────────────────────────────────────── */
        function makeTendrils(count) {
            const geo = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];

            const palette = [0xff6ef7, 0x56cfff, 0x7fff6e, 0xffc85e];

            for (let i = 0; i < count; i++) {
                // origin on brain surface
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                const r0 = 1.35;
                const ox = r0 * Math.sin(phi) * Math.cos(theta);
                const oy = r0 * Math.sin(phi) * Math.sin(theta);
                const oz = r0 * Math.cos(phi);

                // endpoint: extended outward + random jitter
                const ext = 1.6 + Math.random() * 1.2;
                const ex = ox * ext + (Math.random() - .5) * 0.4;
                const ey = oy * ext + (Math.random() - .5) * 0.4;
                const ez = oz * ext + (Math.random() - .5) * 0.4;

                positions.push(ox, oy, oz, ex, ey, ez);

                const c = new THREE.Color(palette[Math.floor(Math.random() * palette.length)]);
                colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));

            const mat = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            return new THREE.LineSegments(geo, mat);
        }

        const tendrils = makeTendrils(180);
        scene.add(tendrils);

        /* ─────────────────────────────────────────────
           RESIZE HANDLER
        ───────────────────────────────────────────── */
        window.addEventListener('resize', () => {
            camera.aspect = W() / H();
            camera.updateProjectionMatrix();
            renderer.setSize(W(), H());
        });

        /* ─────────────────────────────────────────────
           MOUSE PARALLAX on light positions
        ───────────────────────────────────────────── */
        let mx = 0, my = 0;
        window.addEventListener('mousemove', e => {
            mx = (e.clientX / W() - 0.5) * 2;
            my = (e.clientY / H() - 0.5) * 2;
        });

        /* ─────────────────────────────────────────────
           USER INTERACTION — disable auto-rotate on drag
        ───────────────────────────────────────────── */
        let isDragging = false;
        renderer.domElement.addEventListener('pointerdown', () => {
            isDragging = true;
            controls.autoRotate = false;
        });
        window.addEventListener('pointerup', () => {
            isDragging = false;
            // Resume auto-rotate after 3s of no dragging
            setTimeout(() => { if (!isDragging) controls.autoRotate = true; }, 3000);
        });

        /* ─────────────────────────────────────────────
           ANIMATE
        ───────────────────────────────────────────── */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const dt = clock.getDelta ? 0 : 0; // already advanced

            // Shader time uniform
            brainMat.uniforms.uTime.value = t;

            // Gentle brain pulse
            const pulse = 1.0 + Math.sin(t * 1.2) * 0.015;
            brain.scale.setScalar(pulse);

            // Rings orbit
            ringsGroup.rotation.x = t * 0.07;
            ringsGroup.rotation.y = t * 0.12;
            ringsGroup.rotation.z = t * 0.05;

            // Particles slow drift
            const posArr = synPts.geometry.attributes.position.array;
            for (let i = 0; i < posArr.length; i += 3) {
                posArr[i + 1] += Math.sin(t * synSpeeds[i / 3] + i) * 0.0004;
            }
            synPts.geometry.attributes.position.needsUpdate = true;
            synPts.rotation.y += 0.0008;

            // Light parallax
            pointA.position.x = 3 + mx * 2;
            pointA.position.y = 2 - my * 2;
            pointB.position.x = -3 + mx;
            pointB.position.y = -1 - my;

            // Glow inner colour animation
            glowMat.color.setHSL((t * 0.04) % 1, 0.9, 0.35);

            // Tendril opacity flicker
            tendrils.material.opacity = 0.1 + Math.sin(t * 0.8) * 0.08;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        /* ─────────────────────────────────────────────
           HIDE LOADER
        ───────────────────────────────────────────── */
        // Give Three.js a moment to render first frame
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
        }, 600);

    </script>
</body>

</html>
